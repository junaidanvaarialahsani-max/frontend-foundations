<!doctype html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }

      .container {
        display: grid;
        /* grid-template-columns: 1fr 1fr 1fr; */
        /* grid-template-columns: repeat(3, minmax(300px, 1fr)); */
        /* grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); */
        /* grid-template-columns: repeat(3, 1fr); */
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        padding: 20px;
      }

      .box {
      background: lightblue;
      padding: 40px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

      .box:first-child {
        background: lightblue;
        padding: 40px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
        grid-column: span 5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">4</div>
      <div class="box">5</div>
      <div class="box">6</div>
    </div>
  </body>
</html>
