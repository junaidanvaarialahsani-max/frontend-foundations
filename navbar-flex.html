<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .navbar {
      display: flex;
      /* justify-content: space-between; */
      justify-content: space-around;
      align-items: center;
      background: #222;
      padding: 15px 30px;
      color: white;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
    }

    .menu {
      display: flex;
      gap: 20px;
    }

    .menu a {
      color: white;
      text-decoration: none;
    }

    .menu a:hover {
      color: orange;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo">MyBrand</div>
    <div class="menu">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Services</a>
      <a href="#">Contact</a>
    </div>
  </div>

</body>
</html>
